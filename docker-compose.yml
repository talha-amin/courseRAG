services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: courserag-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-courserag}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-courserag}
      POSTGRES_DB: ${POSTGRES_DB:-courserag}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-courserag} -d ${POSTGRES_DB:-courserag}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: courserag-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-courserag}:${POSTGRES_PASSWORD:-courserag}@postgres:5432/${POSTGRES_DB:-courserag}
    ports:
      - '3000:3000'

volumes:
  pgdata:
